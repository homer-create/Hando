name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14'
            args: '--target universal-apple-darwin'
            label: 'mac'
          - platform: 'windows-latest'
            args: ''
            label: 'win'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install NASM (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install nasm -y

      - name: Install NASM (macOS)
        if: matrix.platform == 'macos-14'
        run: brew install nasm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm ci

      - name: Build app (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Hando ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Ad-hoc sign macOS app
        # Zero-cost ad-hoc signature. Doesn't remove the Gatekeeper warning
        # (only Apple notarization does), but ensures Apple Silicon can launch
        # the binary at all and gives the app a stable code identity.
        if: matrix.platform == 'macos-14'
        run: |
          APP="src-tauri/target/universal-apple-darwin/release/bundle/macos/Hando.app"
          codesign --force --deep --sign - "$APP"
          codesign --verify --verbose=2 "$APP"

      - name: Build portable artifact
        env:
          TARGET: ${{ matrix.platform == 'macos-14' && 'universal-apple-darwin' || '' }}
        run: node scripts/build-dist.mjs

      - name: Upload portable artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} dist-final/* --clobber
