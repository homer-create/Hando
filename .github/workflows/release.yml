name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows-portable:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install root npm deps (Sharp + native binaries for portable bundle)
        run: npm install

      - name: Install desktop npm deps (frontend build)
        working-directory: desktop
        run: npm install

      - name: Fetch Node binary for sidecar
        shell: pwsh
        run: |
          $tmp = "$env:RUNNER_TEMP\node.zip"
          $extract = "$env:RUNNER_TEMP\node-dl"
          Invoke-WebRequest https://nodejs.org/dist/v20.11.1/node-v20.11.1-win-x64.zip -OutFile $tmp
          Expand-Archive $tmp $extract -Force
          New-Item -ItemType Directory -Force -Path desktop\src-tauri\binaries | Out-Null
          Copy-Item $extract\node-v20.11.1-win-x64\node.exe desktop\src-tauri\binaries\node-x86_64-pc-windows-msvc.exe

      - name: Build portable bundle
        shell: pwsh
        working-directory: desktop
        run: powershell -ExecutionPolicy Bypass -File scripts\make-portable.ps1

      - name: Zip portable bundle
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          Compress-Archive -Path desktop\Hando-portable\* -DestinationPath "Hando-portable-$version.zip"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Hando-portable-*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
