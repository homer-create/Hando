name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Hando version
      placeholder: "e.g. v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows x64
        - macOS (Apple Silicon)
        - macOS (Intel)
    validations:
      required: true

  - type: dropdown
    id: format
    attributes:
      label: Image format involved
      description: Leave blank if not format-specific
      multiple: true
      options:
        - JPEG
        - PNG
        - WebP
        - AVIF

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect, and what actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Drop a file onto the window
        2. ...
    validations:
      required: true
</content>
</invoke>